version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mini_bpm
      MYSQL_USER: bpm_user
      MYSQL_PASSWORD: bpm_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mini_bpm?useUnicode=true&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: bpm_user
      SPRING_DATASOURCE_PASSWORD: bpm_password
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    # Don't mount volumes - use the built image

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Don't mount volumes - use the built image
    # For development, remove the docker-compose mount and use 'npm run dev' locally

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql_data:
